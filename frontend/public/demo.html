<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumMail - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-retro-yellow: #FFE600;
            --color-retro-pink: #FF6B9D;
            --color-retro-blue: #00D4FF;
            --color-retro-green: #00FF88;
            --color-retro-bg: #FFF8E7;
            --color-retro-white: #FFFEF5;
        }
        body { font-family: system-ui, sans-serif; background: var(--color-retro-bg); }
        .brutal-border { border: 4px solid black; }
        .brutal-shadow { box-shadow: 6px 6px 0 0 black; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="flex items-center justify-between p-4 bg-white brutal-border">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-yellow-400 brutal-border brutal-shadow flex items-center justify-center text-2xl font-black">✉</div>
            <span class="text-2xl font-black uppercase">QuantumMail</span>
        </div>
        <div class="flex items-center gap-2">
            <span id="userId" class="px-3 py-2 border-3 border-black font-bold text-sm bg-gray-100 cursor-pointer" onclick="copyId()">ID: demo_001</span>
            <span class="px-3 py-2 bg-green-500 text-white font-bold border-3 border-black">DEMO</span>
        </div>
    </nav>

    <main class="flex h-[calc(100vh-80px)]">
        <div class="w-[400px] border-r-4 border-black bg-white flex flex-col">
            <div class="flex border-b-4 border-black">
                <button onclick="showImport()" class="p-2 border-r-4 border-black hover:bg-green-400">📥</button>
                <button class="flex-1 p-3 font-black uppercase bg-yellow-400">Inbox</button>
            </div>
            
            <div id="importSection" class="hidden p-2 border-b-4 border-black bg-gray-100">
                <input id="importCode" type="text" placeholder="Paste code here..." class="w-full p-2 border-2 border-black text-xs font-mono">
                <button onclick="importEmail()" class="mt-2 w-full bg-green-500 text-white font-bold py-2 border-2 border-black">Import</button>
            </div>

            <div id="emailList" class="flex-1 p-2 overflow-y-auto flex flex-col gap-2">
                <div class="text-center text-gray-500 p-8">No emails yet</div>
            </div>
        </div>

        <div class="flex-1 p-8 flex items-center justify-center">
            <div class="text-center text-gray-400 text-2xl font-black border-4 border-dashed border-gray-300 p-12">
                Select an email to read
            </div>
        </div>
    </main>

    <div id="composeModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white border-4 border-black brutal-shadow max-w-2xl w-full">
            <div class="bg-yellow-400 p-3 border-b-4 border-black flex justify-between">
                <h2 class="font-black uppercase text-xl">New Message</h2>
                <button onclick="closeCompose()" class="font-black text-2xl">×</button>
            </div>
            <div class="p-4 flex flex-col gap-4">
                <input id="toInput" type="text" placeholder="To: (enter recipient ID)" class="border-b-3 border-black p-2 font-medium">
                <input id="subjectInput" type="text" placeholder="Subject" class="border-b-3 border-black p-2 font-bold">
                <textarea id="bodyInput" placeholder="Your message..." class="flex-1 min-h-[200px] border-3 border-black p-4 font-mono"></textarea>
            </div>
            <div class="p-4 border-t-4 border-black bg-gray-100 flex justify-between">
                <span class="text-sm font-bold text-gray-500">🔒 Demo Mode</span>
                <button onclick="sendEmail()" class="bg-green-500 px-6 py-3 font-black uppercase border-3 border-black brutal-shadow">Send</button>
            </div>
        </div>
    </div>

    <button onclick="openCompose()" class="fixed bottom-8 right-8 w-16 h-16 bg-pink-500 text-white text-3xl font-black border-4 border-black brutal-shadow hover:translate-x-1 hover:translate-y-1 hover:shadow-none transition-all">+</button>

    <script>
        let userId = 'demo_' + Math.random().toString(36).substr(2, 6);
        document.getElementById('userId').textContent = 'ID: ' + userId;
        
        let emails = [];
        
        function copyId() {
            navigator.clipboard.writeText(userId);
            alert('ID copied: ' + userId);
        }
        
        function showImport() {
            document.getElementById('importSection').classList.toggle('hidden');
        }
        
        function importEmail() {
            const code = document.getElementById('importCode').value;
            try {
                const data = JSON.parse(atob(code));
                if (data.used) {
                    alert('⚠️ This email has already been used!');
                    return;
                }
                const used = JSON.parse(localStorage.getItem('usedCodes') || '[]');
                if (used.includes(data.signature)) {
                    alert('⚠️ This email has already been used!');
                    return;
                }
                used.push(data.signature);
                localStorage.setItem('usedCodes', JSON.stringify(used));
                emails.unshift(data);
                renderEmails();
                alert('📬 Email received!');
            } catch(e) {
                alert('Invalid code');
            }
        }
        
        function renderEmails() {
            const list = document.getElementById('emailList');
            if (emails.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-500 p-8">No emails yet</div>';
                return;
            }
            list.innerHTML = emails.map(email => `
                <button onclick="selectEmail('${email.signature}')" class="text-left p-4 border-3 border-black bg-white hover:bg-gray-50 shadow-2 flex flex-col gap-1">
                    <div class="flex justify-between">
                        <span class="font-black text-sm">From: ${email.from.substring(0,10)}...</span>
                    </div>
                    <h4 class="font-bold text-base">${email.subject}</h4>
                    <p class="text-sm text-gray-600 truncate">${email.body.substring(0,50)}...</p>
                </button>
            `).join('');
        }
        
        function openCompose() {
            document.getElementById('composeModal').classList.remove('hidden');
        }
        
        function closeCompose() {
            document.getElementById('composeModal').classList.add('hidden');
        }
        
        function sendEmail() {
            const to = document.getElementById('toInput').value;
            const subject = document.getElementById('subjectInput').value;
            const body = document.getElementById('bodyInput').value;
            
            const email = {
                from: userId,
                to: to,
                subject: subject,
                body: body,
                signature: Math.random().toString(36).substr(2, 12),
                used: false,
                timestamp: Date.now()
            };
            
            const code = btoa(JSON.stringify(email));
            
            alert('📧 Email created!\n\nShare this code with recipient:\n\n' + code);
            
            document.getElementById('toInput').value = '';
            document.getElementById('subjectInput').value = '';
            document.getElementById('bodyInput').value = '';
            closeCompose();
        }
    </script>
</body>
</html>
